<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Speech Analyst – Sprechtempo & Füllwörter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Speech Analyst</h1>
      <p class="subtitle">Echtzeit-Sprachanalyse</p>
    </header>

    <main>
      <!-- Mikrofon-Button -->
      <button id="micButton" class="mic-button" aria-label="Mikrofon starten/stoppen">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor">
          <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
          <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
        </svg>
      </button>
      <p id="micStatus" class="status">Klicke zum Starten</p>

      <!-- WPM & Feedback -->
      <div class="metrics">
        <div class="metric-card">
          <span class="metric-label">Wörter pro Minute</span>
          <span id="wpmDisplay" class="metric-value">0</span>
        </div>
        <div class="metric-card feedback-card">
          <span class="metric-label">Feedback</span>
          <span id="feedbackDisplay" class="metric-value feedback">—</span>
        </div>
      </div>

      <!-- Füllwort-Zähler -->
      <div class="filler-section">
        <div class="filler-row">
          <span class="metric-label">Füllwörter</span>
          <span id="fillerCount" class="metric-value">0</span>
          <span class="metric-label">Dichte</span>
          <span id="fillerDensity" class="metric-value">0%</span>
        </div>
        <div id="fillerWarning" class="warning hidden">
          ⚠️ Hohe Füllwort-Dichte – achte auf deine Ausdrucksweise!
        </div>
      </div>

      <!-- Transkript -->
      <div class="transcript-section">
        <h2>Transkript</h2>
        <p id="transcript" class="transcript">…</p>
      </div>

      <!-- Reset-Button -->
      <button id="resetButton" class="reset-button">Zurücksetzen</button>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
